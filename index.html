<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сюрприз для Діани 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            background:
                linear-gradient(135deg, rgba(10, 0, 20, 0.86), rgba(35, 0, 28, 0.72)),
                url('photo_2026-07-01_02-12-49.jpg') center/cover no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at top left, rgba(255, 105, 180, 0.24), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(255, 192, 203, 0.16), transparent 24%);
            z-index: 0;
        }

        .neon-text {
            text-shadow: 0 0 10px #ff4d94, 0 0 20px #ff4d94, 0 0 40px #ff1493, 0 0 60px #ff1493;
        }

        .card {
            background: rgba(22, 0, 18, 0.88);
            backdrop-filter: blur(17px);
            border: 1px solid rgba(255, 111, 175, 0.38);
            box-shadow: 0 20px 80px rgba(255, 0, 110, 0.25);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 45%, rgba(255,255,255,0.03));
            pointer-events: none;
        }

        .photo-frame {
            position: relative;
            overflow: hidden;
            border-radius: 1.45rem;
            border: 2px solid rgba(255, 255, 255, 0.32);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.34);
            max-width: 360px;
            margin: 0 auto;
        }

        .photo-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.14) 100%);
            pointer-events: none;
        }

        .photo-frame img {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            display: block;
            transform: scale(1.02);
            transition: transform 0.6s ease;
        }

        .photo-frame:hover img {
            transform: scale(1.06);
        }

        .photo-badge {
            position: absolute;
            right: -10px;
            bottom: -12px;
            width: 76px;
            height: 76px;
            border-radius: 999px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.7);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        .photo-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .message-text {
            font-size: 1.05rem;
            line-height: 1.85;
            word-break: break-word;
            hyphens: auto;
        }

        .heart-float {
            animation: heartFloat 4.6s ease-in-out infinite;
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd6e8;
            border-radius: 999px;
            box-shadow: 0 0 10px #ff69b4;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes heartFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-16px) scale(1.05); }
        }

        @keyframes sparkle {
            0%, 100% { transform: scale(0.7); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        @keyframes floatHeart {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); }
            100% { transform: translate3d(0, 110vh, 0) rotate(20deg); }
        }

        @media (max-width: 640px) {
            body {
                background-attachment: scroll;
            }

            .photo-frame {
                max-width: 280px;
            }

            .photo-badge {
                width: 58px;
                height: 58px;
                right: -6px;
                bottom: -8px;
            }

            .message-text {
                font-size: 0.96rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden relative px-4 py-6 sm:py-10">
    <div id="hearts-bg" class="absolute inset-0 pointer-events-none z-0"></div>
    <div id="sparkles" class="absolute inset-0 pointer-events-none z-0"></div>

    <div class="max-w-2xl w-full mx-auto relative z-10">
        <div class="card rounded-[2rem] p-5 sm:p-8 md:p-10 text-center relative">
            <div class="absolute -top-8 left-1/2 transform -translate-x-1/2 text-6xl heart-float z-10">💖</div>

            <div class="photo-frame mb-6">
                <img src="photo_2026-07-01_02-12-49.jpg" alt="Діана">
                <div class="photo-badge">
                    <img src="photo_2026-07-01_02-12-49.jpg" alt="Діана">
                </div>
            </div>

            <p class="text-xs uppercase tracking-[0.4em] text-pink-200/80 mb-4">Сюрприз для тебе</p>
            <h1 class="text-5xl sm:text-6xl font-bold neon-text mb-4 tracking-wide" style="font-family: 'Dancing Script', cursive; color: #ffd1e6;">
                Діано
            </h1>
            <p class="text-base sm:text-lg text-pink-100/90 mb-5">Ти — найяскравіша зірка в моєму світі ✨</p>

            <div id="message" class="message-text text-pink-100 text-left mb-8 px-1 sm:px-2"></div>

            <div class="h-px bg-gradient-to-r from-transparent via-pink-300/50 to-transparent my-8"></div>

            <div class="text-pink-300 text-sm sm:text-base">
                З любов’ю, той, хто думає про тебе завжди 💗
            </div>
        </div>

        <div class="text-center mt-6 sm:mt-8">
            <button onclick="celebrate()"
                class="px-10 py-4 bg-gradient-to-r from-pink-500 via-rose-500 to-fuchsia-500 hover:from-pink-600 hover:via-rose-600 hover:to-fuchsia-600 text-white font-bold text-lg rounded-full transition-all duration-300 shadow-lg hover:shadow-pink-500/40 w-full max-w-xs">
                Відкрити мій сюрприз
            </button>
        </div>
    </div>

    <div id="celebration" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 px-6">
        <div class="absolute inset-0 bg-cover bg-center opacity-40" style="background-image: url('photo_2026-07-01_02-12-49.jpg');"></div>
        <div class="relative text-center max-w-md">
            <div class="text-7xl mb-6">💘🎉💘</div>
            <h2 class="text-5xl font-bold neon-text mb-4" style="font-family: 'Dancing Script', cursive; color: #ffd1e6;">
                Діано, я тебе люблю!
            </h2>
            <p class="text-2xl text-pink-200">Ти — моє найприємніше світло ✨</p>
            <button onclick="location.reload()" class="mt-8 px-8 py-4 border border-pink-400 rounded-full hover:bg-white/10 transition-colors text-pink-100">
                Ще раз
            </button>
        </div>
    </div>

    <script>
        const messageText = `Діано, ти — не просто особлива для мене людина. Ти — тепло, радість, усмішка й той самий світлий дотик, який робить кожен день ніжнішим. Я люблю твою чарівність, твою доброту, твою силу й ту магію, яку ти несеш у моє життя. Хочу, щоб ти завжди знала: ти дуже дорога мені, ти дуже особлива, і я хочу, щоб у твоєму серці завжди було місце для щастя, любові й безмежної радісності. Ти — моя найкраща мрія, яка стала справжньою. Я дуже тебе люблю 💖`;

        function typeMessage() {
            let i = 0;
            const element = document.getElementById('message');
            element.innerHTML = '';

            function type() {
                if (i < messageText.length) {
                    element.innerHTML += messageText[i] === ' ' ? '&nbsp;' : messageText[i];
                    i++;
                    setTimeout(type, 35);
                }
            }
            type();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.textContent = '💗';
            heart.style.position = 'absolute';
            heart.style.fontSize = (Math.random() * 24 + 16) + 'px';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-30px';
            heart.style.opacity = Math.random() * 0.7 + 0.5;
            heart.style.animation = `floatHeart ${Math.random() * 10 + 12}s linear infinite`;
            document.getElementById('hearts-bg').appendChild(heart);
            setTimeout(() => heart.remove(), 20000);
        }

        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('sparkles').appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 6000);
        }

        function celebrate() {
            document.getElementById('celebration').classList.remove('hidden');
            for (let i = 0; i < 90; i++) {
                setTimeout(createHeart, i * 8);
            }
        }

        window.onload = () => {
            typeMessage();
            for (let i = 0; i < 30; i++) {
                setTimeout(createHeart, i * 70);
            }
            for (let i = 0; i < 45; i++) {
                setTimeout(createSparkle, i * 90);
            }
            setInterval(() => {
                if (Math.random() > 0.3) createHeart();
                if (Math.random() > 0.35) createSparkle();
            }, 500);
        };
    </script>
</body>
</html>
